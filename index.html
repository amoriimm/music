<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gothic Castle</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:radial-gradient(circle at center,#140000,#000);
color:#c40000;
font-family:'Cinzel', serif;
overflow:hidden;
height:100vh;
}

/* LUA */

.moon{
position:absolute;
top:70px;
right:180px;
width:140px;
height:140px;
background:radial-gradient(circle,#ff4d4d,#5a0000);
border-radius:50%;
box-shadow:0 0 80px red,0 0 120px #ff0000;
}

/* NEVOA */

.fog{
position:fixed;
width:250%;
height:200%;
background:radial-gradient(circle,rgba(120,0,0,0.3),transparent 60%);
animation:fogmove 25s linear infinite;
}

@keyframes fogmove{
0%{transform:translateX(0)}
100%{transform:translateX(-40%)}
}

/* MORCEGOS */

.bat{
position:absolute;
font-size:34px;
color:#500000;
animation:fly 12s linear infinite;
}

@keyframes fly{
0%{transform:translateX(-100px)}
100%{transform:translateX(120vw)}
}

.bat:nth-child(1){top:120px;}
.bat:nth-child(2){top:200px;}
.bat:nth-child(3){top:160px;}

/* TITULO */

.title{
font-family:'UnifrakturCook', cursive;
font-size:85px;
color:#ff0000;
text-align:center;
margin-top:120px;
text-shadow:0 0 30px red;
position:relative;
}

/* SANGUE ESCORRENDO */

.drip{
position:absolute;
width:6px;
height:40px;
background:#8b0000;
top:80px;
border-radius:3px;
animation:drip 3s infinite;
}

.drip:nth-child(1){left:45%}
.drip:nth-child(2){left:50%; animation-delay:1s}
.drip:nth-child(3){left:55%; animation-delay:2s}

@keyframes drip{
0%{height:0}
50%{height:50px}
100%{height:0}
}

/* TEXTO */

.subtitle{
text-align:center;
margin-top:40px;
font-size:22px;
letter-spacing:3px;
color:#aa0000;
line-height:1.8;
text-shadow:0 0 10px #500000;
}

/* CASTELO */

.castle{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:650px;
filter:drop-shadow(0 20px 40px black);
}

.window{
fill:#ff0000;
animation:windowGlow 3s infinite alternate;
}

@keyframes windowGlow{
from{opacity:0.4}
to{opacity:1}
}

</style>
</head>

<body>

<div class="fog"></div>

<div class="moon"></div>

<div class="bat">🦇</div>
<div class="bat">🦇</div>
<div class="bat">🦇</div>

<div class="title">
Join Me In Death

<div class="drip"></div>
<div class="drip"></div>
<div class="drip"></div>

</div>

<div class="subtitle">
Won't you die tonight for love?<br>
(Baby, join me in death)<br><br>

Won't you die?<br>
(Baby, join me in death)<br><br>

Won't you die tonight for love?<br>
(Baby, join me in death)
</div>

<!-- CASTELO -->

<svg class="castle" viewBox="0 0 700 350">

<rect x="160" y="120" width="80" height="220" fill="#120000"/>
<polygon points="160,120 200,50 240,120" fill="#1a0000"/>

<rect x="460" y="120" width="80" height="220" fill="#120000"/>
<polygon points="460,120 500,50 540,120" fill="#1a0000"/>

<rect x="250" y="160" width="200" height="180" fill="#0d0000"/>

<rect x="330" y="220" width="40" height="120" fill="#050000"/>

<rect x="190" y="200" width="12" height="25" class="window"/>
<rect x="500" y="200" width="12" height="25" class="window"/>
<rect x="310" y="190" width="12" height="25" class="window"/>
<rect x="380" y="190" width="12" height="25" class="window"/>

</svg>

</body>
</html>
